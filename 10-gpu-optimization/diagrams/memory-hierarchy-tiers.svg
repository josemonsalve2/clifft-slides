<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">GPU Kernel Tier Architecture — AMD MI300X</title>
  <desc id="desc">Three GPU kernel tiers and their memory hierarchy for the clifft quantum circuit simulator.</desc>

  <defs>
    <linearGradient id="tier1Fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00cc66" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00cc66" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="tier2Fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8800" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff8800" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="tier3Fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cc2222" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#cc2222" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#00cc66"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ff8800"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#cc2222"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="#1a1a2e"/>
  <path d="M0 78 H800 M0 390 H800" stroke="#ffffff" stroke-opacity="0.06"/>
  <path d="M40 0 V450 M760 0 V450" stroke="#ffffff" stroke-opacity="0.025"/>

  <text x="400" y="31" fill="#ffffff" font-family="Arial, sans-serif" font-size="21" font-weight="700" text-anchor="middle">GPU Kernel Tier Architecture — AMD MI300X</text>
  <text x="400" y="50" fill="#aeb4c7" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">clifft quantum circuit simulator · memory placement drives throughput</text>

  <!-- Rank axis -->
  <text x="34" y="72" fill="#cfd3df" font-family="Arial, sans-serif" font-size="10" font-weight="700">QUBIT RANK</text>
  <line x1="40" y1="88" x2="760" y2="88" stroke="#aeb4c7" stroke-width="1.5"/>
  <path d="M760 88 l-8 -4 v8 z" fill="#aeb4c7"/>

  <g fill="#dfe3ed" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
    <line x1="40" y1="83" x2="40" y2="94" stroke="#dfe3ed"/>
    <text x="40" y="105">0</text>
    <line x1="192" y1="83" x2="192" y2="94" stroke="#dfe3ed"/>
    <text x="192" y="105">4</text>
    <line x1="230" y1="83" x2="230" y2="94" stroke="#dfe3ed"/>
    <text x="230" y="105">5</text>
    <line x1="419" y1="83" x2="419" y2="94" stroke="#dfe3ed"/>
    <text x="419" y="105">10</text>
    <line x1="457" y1="83" x2="457" y2="94" stroke="#dfe3ed"/>
    <text x="457" y="105">11</text>
    <line x1="760" y1="83" x2="760" y2="94" stroke="#dfe3ed"/>
    <text x="760" y="105">19</text>
  </g>

  <line x1="211" y1="78" x2="211" y2="369" stroke="#ffffff" stroke-opacity="0.10" stroke-dasharray="3 4"/>
  <line x1="438" y1="78" x2="438" y2="369" stroke="#ffffff" stroke-opacity="0.10" stroke-dasharray="3 4"/>

  <!-- Tier regions -->
  <rect x="40" y="116" width="171" height="238" rx="10" fill="url(#tier1Fill)" stroke="#00cc66" stroke-width="2"/>
  <rect x="222" y="116" width="216" height="238" rx="10" fill="url(#tier2Fill)" stroke="#ff8800" stroke-width="2"/>
  <rect x="449" y="116" width="311" height="238" rx="10" fill="url(#tier3Fill)" stroke="#cc2222" stroke-width="2"/>

  <!-- Tier 1 -->
  <rect x="40" y="116" width="171" height="31" rx="9" fill="#00cc66" fill-opacity="0.22"/>
  <text x="125.5" y="136" fill="#67f0a9" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Tier 1: Register File</text>
  <text x="55" y="165" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="700">VGPRs: 512/SIMD</text>
  <rect x="55" y="178" width="141" height="49" rx="5" fill="#0d0d1a" fill-opacity="0.72" stroke="#00cc66" stroke-opacity="0.75"/>
  <text x="125.5" y="198" fill="#ffffff" font-family="monospace" font-size="13" font-weight="700" text-anchor="middle">v[16]</text>
  <text x="125.5" y="216" fill="#cfd3df" font-family="Arial, sans-serif" font-size="10.5" text-anchor="middle">amplitude array (128B)</text>
  <text x="55" y="250" fill="#dfe3ed" font-family="Arial, sans-serif" font-size="10.5">1 thread = 1 shot</text>
  <text x="55" y="278" fill="#9ba3b8" font-family="Arial, sans-serif" font-size="9.5" letter-spacing="0.5">THROUGHPUT</text>
  <text x="55" y="304" fill="#00ff80" font-family="Arial, sans-serif" font-size="23" font-weight="700" filter="url(#glowGreen)">48M</text>
  <text x="102" y="304" fill="#dfe3ed" font-family="Arial, sans-serif" font-size="11">shots/s</text>
  <text x="55" y="334" fill="#67f0a9" font-family="Arial, sans-serif" font-size="10">rank 0–4</text>

  <!-- Tier 2 -->
  <rect x="222" y="116" width="216" height="31" rx="9" fill="#ff8800" fill-opacity="0.22"/>
  <text x="330" y="136" fill="#ffb35c" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Tier 2: Shared Memory</text>
  <text x="237" y="165" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="700">LDS: 64KB/CU</text>
  <rect x="237" y="178" width="186" height="49" rx="5" fill="#0d0d1a" fill-opacity="0.72" stroke="#ff8800" stroke-opacity="0.75"/>
  <text x="330" y="198" fill="#ffffff" font-family="monospace" font-size="13" font-weight="700" text-anchor="middle">v[1024]</text>
  <text x="330" y="216" fill="#cfd3df" font-family="Arial, sans-serif" font-size="10.5" text-anchor="middle">amplitude array (8KB)</text>
  <text x="237" y="247" fill="#dfe3ed" font-family="Arial, sans-serif" font-size="10.5">256 threads cooperate</text>
  <text x="237" y="261" fill="#dfe3ed" font-family="monospace" font-size="9.5">__syncthreads barriers</text>
  <text x="237" y="285" fill="#9ba3b8" font-family="Arial, sans-serif" font-size="9.5" letter-spacing="0.5">THROUGHPUT</text>
  <text x="237" y="311" fill="#ff9d2e" font-family="Arial, sans-serif" font-size="23" font-weight="700" filter="url(#glowOrange)">5.6M</text>
  <text x="291" y="311" fill="#dfe3ed" font-family="Arial, sans-serif" font-size="11">shots/s</text>
  <text x="237" y="334" fill="#ffb35c" font-family="Arial, sans-serif" font-size="10">rank 5–10</text>

  <!-- Tier 3 -->
  <rect x="449" y="116" width="311" height="31" rx="9" fill="#cc2222" fill-opacity="0.27"/>
  <text x="604.5" y="136" fill="#ff7777" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Tier 3: HBM Global Memory</text>
  <text x="464" y="165" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="700">HBM: 192GB</text>
  <rect x="464" y="178" width="281" height="49" rx="5" fill="#0d0d1a" fill-opacity="0.72" stroke="#cc2222" stroke-opacity="0.85"/>
  <text x="604.5" y="198" fill="#ffffff" font-family="monospace" font-size="13" font-weight="700" text-anchor="middle">v[524288]</text>
  <text x="604.5" y="216" fill="#cfd3df" font-family="Arial, sans-serif" font-size="10.5" text-anchor="middle">amplitude array (4MB)</text>
  <text x="464" y="247" fill="#dfe3ed" font-family="Arial, sans-serif" font-size="10.5">1 block = 1 shot · persistent kernel</text>
  <rect x="625" y="237" width="120" height="22" rx="11" fill="#cc2222" fill-opacity="0.25" stroke="#ef5555" stroke-opacity="0.8"/>
  <text x="685" y="252" fill="#ffaaaa" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" text-anchor="middle">5.3 TB/s ceiling</text>
  <text x="464" y="285" fill="#9ba3b8" font-family="Arial, sans-serif" font-size="9.5" letter-spacing="0.5">THROUGHPUT</text>
  <text x="464" y="311" fill="#ff5555" font-family="Arial, sans-serif" font-size="23" font-weight="700" filter="url(#glowRed)">145K</text>
  <text x="522" y="311" fill="#dfe3ed" font-family="Arial, sans-serif" font-size="11">shots/s</text>
  <text x="464" y="334" fill="#ff7777" font-family="Arial, sans-serif" font-size="10">rank 11–19</text>

  <!-- Performance cliff staircase -->
  <path d="M160 289 H215 V316 H442 V340 H727" fill="none" stroke="#f5f5f7" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
  <circle cx="160" cy="289" r="4" fill="#00cc66"/>
  <circle cx="442" cy="316" r="4" fill="#ff8800"/>
  <path d="M727 340 l-10 -5 v10 z" fill="#cc2222"/>
  <rect x="165" y="270" width="112" height="17" rx="8.5" fill="#0d0d1a" stroke="#ffffff" stroke-opacity="0.16"/>
  <text x="221" y="282" fill="#ffffff" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">48M → 5.6M · 8.6× cliff</text>
  <rect x="419" y="294" width="132" height="17" rx="8.5" fill="#0d0d1a" stroke="#ffffff" stroke-opacity="0.16"/>
  <text x="485" y="306" fill="#ffffff" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">5.6M → 145K · 38× cliff</text>
  <rect x="610" y="319" width="135" height="17" rx="8.5" fill="#cc2222" fill-opacity="0.34" stroke="#ff6666" stroke-opacity="0.65"/>
  <text x="677.5" y="331" fill="#ffffff" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">330× total performance range</text>

  <!-- Array size scale -->
  <text x="40" y="379" fill="#9ba3b8" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" letter-spacing="0.8">AMPLITUDE ARRAY SCALE</text>
  <rect x="187" y="365" width="58" height="23" rx="5" fill="#00cc66" fill-opacity="0.14" stroke="#00cc66"/>
  <text x="216" y="380.5" fill="#8ff7bf" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">128B</text>
  <line x1="252" y1="376.5" x2="320" y2="376.5" stroke="#00cc66" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <rect x="329" y="365" width="58" height="23" rx="5" fill="#ff8800" fill-opacity="0.14" stroke="#ff8800"/>
  <text x="358" y="380.5" fill="#ffc175" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">8KB</text>
  <line x1="394" y1="376.5" x2="462" y2="376.5" stroke="#ff8800" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <rect x="471" y="365" width="62" height="23" rx="5" fill="#cc2222" fill-opacity="0.18" stroke="#cc2222"/>
  <text x="502" y="380.5" fill="#ff8e8e" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">4MB</text>
  <line x1="540" y1="376.5" x2="597" y2="376.5" stroke="#cc2222" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="610" y="380" fill="#cfd3df" font-family="Arial, sans-serif" font-size="10">32,768× growth</text>

  <!-- Memory hierarchy labels -->
  <g font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
    <text x="125" y="406" fill="#67f0a9">PRIVATE · ON-CHIP</text>
    <text x="330" y="406" fill="#ffb35c">WORKGROUP · ON-CHIP</text>
    <text x="605" y="406" fill="#ff7777">DEVICE · OFF-CHIP</text>
  </g>
  <line x1="67" y1="414" x2="183" y2="414" stroke="#00cc66" stroke-width="2"/>
  <line x1="265" y1="414" x2="395" y2="414" stroke="#ff8800" stroke-width="2"/>
  <line x1="527" y1="414" x2="683" y2="414" stroke="#cc2222" stroke-width="2"/>

  <!-- Footer -->
  <rect x="0" y="434" width="800" height="66" fill="#0d0d1a"/>
  <line x1="0" y1="434" x2="800" y2="434" stroke="#69708a" stroke-opacity="0.45"/>
  <text x="400" y="454" fill="#9ba3b8" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" letter-spacing="1.2" text-anchor="middle">AMD INSTINCT MI300X HARDWARE</text>
  <g fill="#ffffff" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
    <text x="80" y="480">304 CUs</text>
    <text x="237" y="480">512 VGPRs/SIMD</text>
    <text x="400" y="480">64KB LDS/CU</text>
    <text x="556" y="480">192GB HBM3</text>
    <text x="716" y="480">5.3 TB/s</text>
  </g>
  <g stroke="#4c5369" stroke-width="1">
    <line x1="155" y1="465" x2="155" y2="486"/>
    <line x1="319" y1="465" x2="319" y2="486"/>
    <line x1="480" y1="465" x2="480" y2="486"/>
    <line x1="636" y1="465" x2="636" y2="486"/>
  </g>
</svg>
