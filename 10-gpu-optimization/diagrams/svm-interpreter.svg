<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" font-family="'Courier New', Consolas, monospace">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="28" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle" font-family="'Courier New', Consolas, monospace">SVM Interpreter: 35 opcode handlers ⇒ 108 VGPRs, switch dispatch overhead</text>

  <!-- ===== GPU THREAD BOX ===== -->
  <rect x="14" y="42" width="490" height="442" rx="8" fill="rgba(83,216,251,0.06)" stroke="#53d8fb" stroke-width="1.5"/>
  <text x="22" y="59" fill="#53d8fb" font-size="11" font-weight="bold">GPU Thread (one per shot)</text>
  <text x="22" y="73" fill="#aaaacc" font-size="10">for each instruction in bytecode[] {</text>

  <!-- ===== SWITCH BOX ===== -->
  <rect x="28" y="80" width="240" height="392" rx="8" fill="rgba(233,69,96,0.10)" stroke="#e94560" stroke-width="1.5"/>
  <text x="148" y="97" fill="#e94560" font-size="11" font-weight="bold" text-anchor="middle">switch (opcode)</text>

  <!-- Branch divergence annotation -->
  <rect x="60" y="100" width="176" height="22" rx="5" fill="rgba(233,160,69,0.22)" stroke="#e9a045" stroke-width="1.2"/>
  <text x="148" y="115" fill="#e9a045" font-size="9.5" font-weight="bold" text-anchor="middle">⚠ BRANCH DIVERGENCE</text>

  <!-- Closing brace for for-loop -->
  <text x="22" y="483" fill="#aaaacc" font-size="10">}</text>

  <!-- ===== OPCODE HANDLER BOXES ===== -->
  <!-- Define handlers: label, y, color -->
  <!-- FRAME_CNOT -->
  <rect x="38" y="130" width="218" height="26" rx="5" fill="rgba(83,216,251,0.13)" stroke="#53d8fb" stroke-width="1"/>
  <text x="48" y="147" fill="#53d8fb" font-size="10">case FRAME_CNOT:</text>
  <text x="200" y="147" fill="#aaaacc" font-size="9" text-anchor="end">rw px,pz</text>

  <!-- FRAME_H -->
  <rect x="38" y="160" width="218" height="26" rx="5" fill="rgba(83,216,251,0.13)" stroke="#53d8fb" stroke-width="1"/>
  <text x="48" y="177" fill="#53d8fb" font-size="10">case FRAME_H:</text>
  <text x="200" y="177" fill="#aaaacc" font-size="9" text-anchor="end">rw px,pz</text>

  <!-- ARRAY_H -->
  <rect x="38" y="190" width="218" height="26" rx="5" fill="rgba(78,201,176,0.13)" stroke="#4ec9b0" stroke-width="1"/>
  <text x="48" y="207" fill="#4ec9b0" font-size="10">case ARRAY_H:</text>
  <text x="200" y="207" fill="#aaaacc" font-size="9" text-anchor="end">rw v[]</text>

  <!-- EXPAND_T -->
  <rect x="38" y="220" width="218" height="26" rx="5" fill="rgba(78,201,176,0.13)" stroke="#4ec9b0" stroke-width="1"/>
  <text x="48" y="237" fill="#4ec9b0" font-size="10">case EXPAND_T:</text>
  <text x="200" y="237" fill="#aaaacc" font-size="9" text-anchor="end">rw v[], Rng</text>

  <!-- MEAS_ACTIVE -->
  <rect x="38" y="250" width="218" height="26" rx="5" fill="rgba(233,160,69,0.13)" stroke="#e9a045" stroke-width="1"/>
  <text x="48" y="267" fill="#e9a045" font-size="10">case MEAS_ACTIVE:</text>
  <text x="200" y="267" fill="#aaaacc" font-size="9" text-anchor="end">rw meas[], active_k</text>

  <!-- NOISE -->
  <rect x="38" y="280" width="218" height="26" rx="5" fill="rgba(233,160,69,0.13)" stroke="#e9a045" stroke-width="1"/>
  <text x="48" y="297" fill="#e9a045" font-size="10">case NOISE:</text>
  <text x="200" y="297" fill="#aaaacc" font-size="9" text-anchor="end">rw px,pz, Rng</text>

  <!-- RESET -->
  <rect x="38" y="310" width="218" height="26" rx="5" fill="rgba(83,216,251,0.13)" stroke="#53d8fb" stroke-width="1"/>
  <text x="48" y="327" fill="#53d8fb" font-size="10">case RESET:</text>
  <text x="200" y="327" fill="#aaaacc" font-size="9" text-anchor="end">rw v[], px,pz</text>

  <!-- MEASURE_Z -->
  <rect x="38" y="340" width="218" height="26" rx="5" fill="rgba(233,69,96,0.13)" stroke="#e94560" stroke-width="1"/>
  <text x="48" y="357" fill="#e94560" font-size="10">case MEASURE_Z:</text>
  <text x="200" y="357" fill="#aaaacc" font-size="9" text-anchor="end">rw v[], meas[]</text>

  <!-- DETECTOR -->
  <rect x="38" y="370" width="218" height="26" rx="5" fill="rgba(78,201,176,0.13)" stroke="#4ec9b0" stroke-width="1"/>
  <text x="48" y="387" fill="#4ec9b0" font-size="10">case DETECTOR:</text>
  <text x="200" y="387" fill="#aaaacc" font-size="9" text-anchor="end">r meas[]</text>

  <!-- DEPOLARIZE -->
  <rect x="38" y="400" width="218" height="26" rx="5" fill="rgba(233,160,69,0.13)" stroke="#e9a045" stroke-width="1"/>
  <text x="48" y="417" fill="#e9a045" font-size="10">case DEPOLARIZE:</text>
  <text x="200" y="417" fill="#aaaacc" font-size="9" text-anchor="end">rw px,pz, Rng</text>

  <!-- "..." continuation -->
  <text x="148" y="445" fill="#888899" font-size="10" text-anchor="middle">... 25 more handlers ...</text>

  <!-- Register pressure annotation -->
  <rect x="28" y="457" width="240" height="18" rx="4" fill="rgba(233,69,96,0.18)" stroke="#e94560" stroke-width="1"/>
  <text x="148" y="469" fill="#e94560" font-size="9" font-weight="bold" text-anchor="middle">ALL handlers compiled in ⇒ 108 VGPRs</text>

  <!-- ===== SHOTSTATE BOX (right panel) ===== -->
  <rect x="520" y="42" width="266" height="442" rx="8" fill="rgba(78,201,176,0.07)" stroke="#4ec9b0" stroke-width="1.5"/>
  <text x="653" y="61" fill="#4ec9b0" font-size="11" font-weight="bold" text-anchor="middle">ShotState (per thread, VGPR)</text>

  <!-- Divider -->
  <line x1="520" y1="67" x2="786" y2="67" stroke="#4ec9b0" stroke-width="0.7" stroke-dasharray="4,3"/>

  <!-- v[] amplitudes -->
  <rect x="532" y="74" width="242" height="50" rx="6" fill="rgba(78,201,176,0.13)" stroke="#4ec9b0" stroke-width="1"/>
  <text x="653" y="91" fill="#4ec9b0" font-size="10" font-weight="bold" text-anchor="middle">v[16]  —  complex amplitudes</text>
  <text x="653" y="105" fill="#aaaacc" font-size="9" text-anchor="middle">float2 · 16 entries = 32 VGPRs</text>
  <text x="653" y="118" fill="#aaaacc" font-size="9" text-anchor="middle">statevector slice for active qubits</text>

  <!-- px / pz Pauli frame -->
  <rect x="532" y="132" width="242" height="44" rx="6" fill="rgba(83,216,251,0.11)" stroke="#53d8fb" stroke-width="1"/>
  <text x="653" y="149" fill="#53d8fb" font-size="10" font-weight="bold" text-anchor="middle">px[2] / pz[2]  —  Pauli frame</text>
  <text x="653" y="163" fill="#aaaacc" font-size="9" text-anchor="middle">uint64 × 4 = 4 VGPRs (bit-packed)</text>
  <text x="653" y="175" fill="#aaaacc" font-size="8" text-anchor="middle"/>

  <!-- meas[] -->
  <rect x="532" y="184" width="242" height="44" rx="6" fill="rgba(233,160,69,0.11)" stroke="#e9a045" stroke-width="1"/>
  <text x="653" y="201" fill="#e9a045" font-size="10" font-weight="bold" text-anchor="middle">meas[4096]  —  measurement record</text>
  <text x="653" y="215" fill="#aaaacc" font-size="9" text-anchor="middle">bit-packed → 64 VGPRs (uint64×64)</text>
  <text x="653" y="227" fill="#aaaacc" font-size="8" text-anchor="middle"/>

  <!-- Rng -->
  <rect x="532" y="236" width="116" height="36" rx="6" fill="rgba(233,160,69,0.11)" stroke="#e9a045" stroke-width="1"/>
  <text x="590" y="252" fill="#e9a045" font-size="10" font-weight="bold" text-anchor="middle">Rng</text>
  <text x="590" y="265" fill="#aaaacc" font-size="9" text-anchor="middle">Philox state 4 VGPRs</text>

  <!-- active_k -->
  <rect x="656" y="236" width="118" height="36" rx="6" fill="rgba(83,216,251,0.11)" stroke="#53d8fb" stroke-width="1"/>
  <text x="715" y="252" fill="#53d8fb" font-size="10" font-weight="bold" text-anchor="middle">active_k</text>
  <text x="715" y="265" fill="#aaaacc" font-size="9" text-anchor="middle">uint32, 1 VGPR</text>

  <!-- VGPR total bar -->
  <rect x="532" y="282" width="242" height="22" rx="5" fill="rgba(233,69,96,0.20)" stroke="#e94560" stroke-width="1.2"/>
  <text x="653" y="297" fill="#e94560" font-size="10" font-weight="bold" text-anchor="middle">Total: ~108 VGPRs allocated per thread</text>

  <!-- Legend -->
  <text x="653" y="322" fill="#888899" font-size="9" text-anchor="middle">─── register footprint breakdown ───</text>
  <rect x="532" y="330" width="242" height="92" rx="6" fill="rgba(255,255,255,0.03)" stroke="#444466" stroke-width="0.8"/>
  <rect x="542" y="340" width="10" height="10" rx="2" fill="#4ec9b0"/>
  <text x="558" y="350" fill="#ccccdd" font-size="9">v[]   32 VGPRs</text>
  <rect x="542" y="356" width="10" height="10" rx="2" fill="#53d8fb"/>
  <text x="558" y="366" fill="#ccccdd" font-size="9">px/pz  4 VGPRs</text>
  <rect x="542" y="372" width="10" height="10" rx="2" fill="#e9a045"/>
  <text x="558" y="382" fill="#ccccdd" font-size="9">meas[] 64 VGPRs</text>
  <rect x="542" y="388" width="10" height="10" rx="2" fill="#e9a045"/>
  <text x="558" y="398" fill="#ccccdd" font-size="9">Rng+misc  8 VGPRs</text>
  <rect x="680" y="340" width="10" height="10" rx="2" fill="#e94560"/>
  <text x="696" y="350" fill="#ccccdd" font-size="9">⬇ occupancy</text>
  <text x="696" y="364" fill="#888899" font-size="8">256 VGPRs/CU</text>
  <text x="696" y="378" fill="#888899" font-size="8">→ 2 waves max</text>
  <text x="696" y="392" fill="#888899" font-size="8">vs 8 ideal</text>

  <!-- Occupancy annotation -->
  <rect x="532" y="432" width="242" height="40" rx="6" fill="rgba(233,69,96,0.13)" stroke="#e94560" stroke-width="1"/>
  <text x="653" y="449" fill="#e94560" font-size="9.5" font-weight="bold" text-anchor="middle">Low occupancy: 2/8 waves per CU</text>
  <text x="653" y="464" fill="#aaaacc" font-size="9" text-anchor="middle">switch overhead + register spill latency</text>

  <!-- ===== ARROWS from handlers to ShotState ===== -->
  <!-- middle connector vertical line on left of ShotState -->
  <line x1="510" y1="147" x2="530" y2="147" stroke="#53d8fb" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-cyan)"/>
  <line x1="510" y1="172" x2="530" y2="155" stroke="#53d8fb" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="510" y1="202" x2="530" y2="104" stroke="#4ec9b0" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>
  <line x1="510" y1="232" x2="530" y2="108" stroke="#4ec9b0" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="510" y1="262" x2="530" y2="210" stroke="#e9a045" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-orange)"/>
  <line x1="510" y1="292" x2="530" y2="155" stroke="#e9a045" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="510" y1="322" x2="530" y2="145" stroke="#53d8fb" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="510" y1="352" x2="530" y2="200" stroke="#e94560" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>
  <line x1="510" y1="382" x2="530" y2="210" stroke="#4ec9b0" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="510" y1="412" x2="530" y2="250" stroke="#e9a045" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Vertical gather line for handler arrows -->
  <line x1="510" y1="143" x2="510" y2="420" stroke="#555577" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr-cyan" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#53d8fb"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#4ec9b0"/>
    </marker>
    <marker id="arr-orange" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#e9a045"/>
    </marker>
    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>

  <!-- "reads/writes" label on arrows -->
  <text x="500" y="295" fill="#888899" font-size="8" text-anchor="middle" transform="rotate(-90,500,295)">reads / writes</text>

  <!-- Bottom legend row -->
  <rect x="14" y="488" width="12" height="8" rx="2" fill="#53d8fb"/>
  <text x="30" y="496" fill="#aaaacc" font-size="8">compute</text>
  <rect x="90" y="488" width="12" height="8" rx="2" fill="#e94560"/>
  <text x="106" y="496" fill="#aaaacc" font-size="8">bottleneck</text>
  <rect x="174" y="488" width="12" height="8" rx="2" fill="#4ec9b0"/>
  <text x="190" y="496" fill="#aaaacc" font-size="8">data</text>
  <rect x="222" y="488" width="12" height="8" rx="2" fill="#e9a045"/>
  <text x="238" y="496" fill="#aaaacc" font-size="8">memory/noise</text>
</svg>