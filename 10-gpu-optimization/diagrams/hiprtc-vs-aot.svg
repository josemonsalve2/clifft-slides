<svg width="800" height="350" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <!-- Background -->
  <rect width="800" height="350" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e0e0ff" font-size="15" font-weight="bold">HIPRTC vs AOT Compilation: -14% Performance Regression</text>

  <!-- ===== LEFT PANEL: HIPRTC ===== -->
  <rect x="20" y="42" width="355" height="188" rx="6" fill="#2a0a0a" stroke="#cc3333" stroke-width="1.5"/>
  <text x="197" y="62" text-anchor="middle" fill="#ff6666" font-size="13" font-weight="bold">HIPRTC (JIT)</text>

  <!-- Pipeline steps -->
  <!-- Step 1 -->
  <rect x="40" y="72" width="100" height="26" rx="4" fill="#3a1a1a" stroke="#884444" stroke-width="1"/>
  <text x="90" y="89" text-anchor="middle" fill="#ffaaaa" font-size="10">HIP source</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="85" x2="162" y2="85" stroke="#884444" stroke-width="1.5"/>
  <polygon points="162,81 170,85 162,89" fill="#884444"/>

  <!-- Step 2 -->
  <rect x="170" y="72" width="145" height="26" rx="4" fill="#3a1a1a" stroke="#884444" stroke-width="1"/>
  <text x="243" y="86" text-anchor="middle" fill="#ffaaaa" font-size="9">hiprtcCompileProgram()</text>

  <!-- Arrow 2 -->
  <line x1="243" y1="98" x2="243" y2="112" stroke="#884444" stroke-width="1.5"/>
  <polygon points="239,112 243,120 247,112" fill="#884444"/>

  <!-- Step 3 -->
  <rect x="170" y="120" width="145" height="26" rx="4" fill="#3a1a1a" stroke="#884444" stroke-width="1"/>
  <text x="243" y="137" text-anchor="middle" fill="#ffaaaa" font-size="10">code object</text>

  <!-- Limitations -->
  <text x="36" y="162" fill="#ff8888" font-size="9">• Fewer optimization passes</text>
  <text x="36" y="176" fill="#ff8888" font-size="9">• No whole-program analysis</text>
  <text x="36" y="190" fill="#ff8888" font-size="9">• Limited register allocation tuning</text>

  <!-- Performance bar background -->
  <rect x="36" y="204" width="323" height="18" rx="3" fill="#1a0a0a" stroke="#553333" stroke-width="1"/>
  <!-- Performance bar fill: 10.0/11.6 ≈ 86.2% of 323 = ~278px -->
  <rect x="36" y="204" width="278" height="18" rx="3" fill="#993333"/>
  <text x="197" y="217" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">10.0M shots/s</text>

  <!-- Regression label -->
  <text x="197" y="244" text-anchor="middle" fill="#ff4444" font-size="12" font-weight="bold">-14% vs AOT</text>

  <!-- ===== RIGHT PANEL: AOT ===== -->
  <rect x="425" y="42" width="355" height="188" rx="6" fill="#0a2a0a" stroke="#33cc55" stroke-width="1.5"/>
  <text x="602" y="62" text-anchor="middle" fill="#66ff88" font-size="13" font-weight="bold">clang++ subprocess (AOT)</text>

  <!-- Pipeline steps -->
  <!-- Step 1 -->
  <rect x="445" y="72" width="100" height="26" rx="4" fill="#1a3a1a" stroke="#448844" stroke-width="1"/>
  <text x="495" y="89" text-anchor="middle" fill="#aaffaa" font-size="10">HIP source</text>

  <!-- Arrow 1 -->
  <line x1="545" y1="85" x2="567" y2="85" stroke="#448844" stroke-width="1.5"/>
  <polygon points="567,81 575,85 567,89" fill="#448844"/>

  <!-- Step 2 -->
  <rect x="575" y="68" width="185" height="34" rx="4" fill="#1a3a1a" stroke="#448844" stroke-width="1"/>
  <text x="668" y="83" text-anchor="middle" fill="#aaffaa" font-size="9">clang++ -O3</text>
  <text x="668" y="96" text-anchor="middle" fill="#aaffaa" font-size="8">--offload-arch=gfx942</text>

  <!-- Arrow 2 -->
  <line x1="668" y1="102" x2="668" y2="116" stroke="#448844" stroke-width="1.5"/>
  <polygon points="664,116 668,124 672,116" fill="#448844"/>

  <!-- Step 3 -->
  <rect x="575" y="124" width="185" height="26" rx="4" fill="#1a3a1a" stroke="#448844" stroke-width="1"/>
  <text x="668" y="141" text-anchor="middle" fill="#aaffaa" font-size="10">.hsaco (shared code object)</text>

  <!-- Quality bullets -->
  <text x="441" y="162" fill="#88ff88" font-size="9">• Full optimization pipeline</text>
  <text x="441" y="176" fill="#88ff88" font-size="9">• LICM, CSE, dead code elimination</text>
  <text x="441" y="190" fill="#88ff88" font-size="9">• Optimal register allocation</text>

  <!-- Performance bar background -->
  <rect x="441" y="204" width="323" height="18" rx="3" fill="#0a1a0a" stroke="#335533" stroke-width="1"/>
  <!-- Full bar for baseline -->
  <rect x="441" y="204" width="323" height="18" rx="3" fill="#228844"/>
  <text x="602" y="217" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">11.6M shots/s</text>

  <!-- Baseline label -->
  <text x="602" y="244" text-anchor="middle" fill="#44ff77" font-size="12" font-weight="bold">Baseline</text>

  <!-- ===== BOTTOM SOLUTION PANEL ===== -->
  <rect x="20" y="265" width="760" height="72" rx="6" fill="#0e0e28" stroke="#5566cc" stroke-width="1.5"/>
  <text x="400" y="284" text-anchor="middle" fill="#aabbff" font-size="11" font-weight="bold">Solution: AOT with Disk Cache + Fallback</text>

  <text x="40" y="302" fill="#8899dd" font-size="9">•  Disk cache:  ~/.clifft/kernel_cache/{hash}.hsaco</text>
  <text x="40" y="317" fill="#8899dd" font-size="9">•  Try clang++ first  →  fallback to HIPRTC if unavailable</text>
  <text x="40" y="332" fill="#8899dd" font-size="9">•  Compilation: ~1-2s, amortized over 10M+ shots  (10 ns/shot overhead)</text>

  <!-- vs arrow between panels -->
  <text x="400" y="145" text-anchor="middle" fill="#8888aa" font-size="18" font-weight="bold">vs</text>
</svg>
