<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Courier New', monospace;">
  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- ==================== LAYER 1: Stim Circuit ==================== -->
  <rect x="20" y="10" width="760" height="90" rx="6" fill="#0d0d1a" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="30" y="28" fill="#00e5ff" font-size="11" font-weight="bold">LAYER 1 — Stim Circuit</text>

  <!-- Circuit wires -->
  <!-- Qubit 0 wire -->
  <line x1="120" y1="55" x2="700" y2="55" stroke="#444" stroke-width="1"/>
  <!-- Qubit 1 wire -->
  <line x1="120" y1="80" x2="700" y2="80" stroke="#444" stroke-width="1"/>

  <!-- Qubit labels -->
  <text x="90" y="59" fill="#00e5ff" font-size="11" text-anchor="end">q0 ─</text>
  <text x="90" y="84" fill="#00e5ff" font-size="11" text-anchor="end">q1 ─</text>

  <!-- H gate on q0 -->
  <rect x="140" y="44" width="28" height="22" rx="3" fill="#003344" stroke="#00e5ff" stroke-width="1.2"/>
  <text x="154" y="59" fill="#00e5ff" font-size="11" font-weight="bold" text-anchor="middle">H</text>

  <!-- CNOT: control on q0, target on q1 -->
  <circle cx="240" cy="55" r="5" fill="#00e5ff"/>
  <line x1="240" y1="55" x2="240" y2="80" stroke="#00e5ff" stroke-width="1.2"/>
  <circle cx="240" cy="80" r="9" fill="none" stroke="#00e5ff" stroke-width="1.2"/>
  <line x1="231" y1="80" x2="249" y2="80" stroke="#00e5ff" stroke-width="1.2"/>
  <line x1="240" y1="71" x2="240" y2="89" stroke="#00e5ff" stroke-width="1.2"/>
  <text x="240" y="36" fill="#888" font-size="9" text-anchor="middle">CNOT</text>

  <!-- T gate on q0 -->
  <rect x="310" y="44" width="28" height="22" rx="3" fill="#003344" stroke="#00e5ff" stroke-width="1.2"/>
  <text x="324" y="59" fill="#00e5ff" font-size="11" font-weight="bold" text-anchor="middle">T</text>

  <!-- M on q0 -->
  <rect x="390" y="44" width="28" height="22" rx="3" fill="#1a0044" stroke="#00e5ff" stroke-width="1.2"/>
  <text x="404" y="59" fill="#00e5ff" font-size="10" font-weight="bold" text-anchor="middle">M</text>
  <!-- M on q1 -->
  <rect x="390" y="69" width="28" height="22" rx="3" fill="#1a0044" stroke="#00e5ff" stroke-width="1.2"/>
  <text x="404" y="84" fill="#00e5ff" font-size="10" font-weight="bold" text-anchor="middle">M</text>

  <!-- DETECTOR -->
  <rect x="460" y="39" width="115" height="52" rx="3" fill="#0d001a" stroke="#00e5ff" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="517" y="52" fill="#00e5ff" font-size="9" text-anchor="middle">DETECTOR</text>
  <text x="517" y="64" fill="#aaa" font-size="8" text-anchor="middle">rec[-1] rec[-2]</text>
  <line x1="418" y1="55" x2="460" y2="65" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="418" y1="80" x2="460" y2="75" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- ==================== ARROW 1 ==================== -->
  <line x1="400" y1="100" x2="400" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="430" y="113" fill="#aaa" font-size="9">Frontend Trace</text>

  <!-- ==================== LAYER 2: HIR ==================== -->
  <rect x="20" y="120" width="760" height="80" rx="6" fill="#0d0d1a" stroke="#00cc66" stroke-width="1.5"/>
  <text x="30" y="138" fill="#00cc66" font-size="11" font-weight="bold">LAYER 2 — HIR (Heisenberg IR)  •  Pauli-mask nodes</text>

  <!-- HIR nodes -->
  <!-- H node -->
  <rect x="50" y="145" width="95" height="40" rx="4" fill="#001a0d" stroke="#00cc66" stroke-width="1.1"/>
  <text x="97" y="160" fill="#00cc66" font-size="9" font-weight="bold" text-anchor="middle">HIR_H</text>
  <text x="97" y="173" fill="#888" font-size="8" text-anchor="middle">axis=0  mask=X</text>

  <!-- CNOT node -->
  <rect x="165" y="145" width="110" height="40" rx="4" fill="#001a0d" stroke="#00cc66" stroke-width="1.1"/>
  <text x="220" y="160" fill="#00cc66" font-size="9" font-weight="bold" text-anchor="middle">HIR_CNOT</text>
  <text x="220" y="173" fill="#888" font-size="8" text-anchor="middle">ctrl=0 tgt=1  ZX</text>

  <!-- T node -->
  <rect x="295" y="145" width="95" height="40" rx="4" fill="#001a0d" stroke="#00cc66" stroke-width="1.1"/>
  <text x="342" y="160" fill="#00cc66" font-size="9" font-weight="bold" text-anchor="middle">HIR_T</text>
  <text x="342" y="173" fill="#888" font-size="8" text-anchor="middle">axis=0  ΔRank+1</text>

  <!-- MEAS node -->
  <rect x="410" y="145" width="110" height="40" rx="4" fill="#001a0d" stroke="#00cc66" stroke-width="1.1"/>
  <text x="465" y="160" fill="#00cc66" font-size="9" font-weight="bold" text-anchor="middle">HIR_MEAS</text>
  <text x="465" y="173" fill="#888" font-size="8" text-anchor="middle">axes=0,1  ΔRank−1</text>

  <!-- DETECTOR node -->
  <rect x="540" y="145" width="110" height="40" rx="4" fill="#001a0d" stroke="#00cc66" stroke-width="1.1"/>
  <text x="595" y="160" fill="#00cc66" font-size="9" font-weight="bold" text-anchor="middle">HIR_DET</text>
  <text x="595" y="173" fill="#888" font-size="8" text-anchor="middle">rec[-1] rec[-2]</text>

  <!-- edges -->
  <line x1="145" y1="165" x2="165" y2="165" stroke="#00cc66" stroke-width="0.8" marker-end="url(#arrg)"/>
  <line x1="275" y1="165" x2="295" y2="165" stroke="#00cc66" stroke-width="0.8" marker-end="url(#arrg)"/>
  <line x1="390" y1="165" x2="410" y2="165" stroke="#00cc66" stroke-width="0.8" marker-end="url(#arrg)"/>
  <line x1="520" y1="165" x2="540" y2="165" stroke="#00cc66" stroke-width="0.8" marker-end="url(#arrg)"/>

  <!-- ==================== ARROW 2 ==================== -->
  <line x1="400" y1="200" x2="400" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="420" y="213" fill="#aaa" font-size="9">Optimizer Passes</text>

  <!-- ==================== LAYER 3: Optimizer ==================== -->
  <rect x="20" y="220" width="760" height="90" rx="6" fill="#0d0d1a" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="30" y="238" fill="#ffaa00" font-size="11" font-weight="bold">LAYER 3 — StatevectorSqueezePass  (peak_rank minimizer)</text>

  <!-- Before box -->
  <rect x="35" y="244" width="210" height="55" rx="4" fill="#1a0800" stroke="#ffaa00" stroke-width="1"/>
  <text x="140" y="258" fill="#ffaa00" font-size="9" font-weight="bold" text-anchor="middle">Before</text>
  <text x="140" y="271" fill="#ccc" font-size="8" text-anchor="middle">T-gate at q0 → rank rises to 1</text>
  <text x="140" y="283" fill="#ccc" font-size="8" text-anchor="middle">peak_rank = 1</text>
  <text x="140" y="295" fill="#ff6666" font-size="8" text-anchor="middle">concurrent T-gates → rank spike</text>

  <!-- Arrow between before/after -->
  <line x1="245" y1="271" x2="285" y2="271" stroke="#ffaa00" stroke-width="1.5" marker-end="url(#arro)"/>

  <!-- After box -->
  <rect x="290" y="244" width="210" height="55" rx="4" fill="#001a08" stroke="#00cc66" stroke-width="1"/>
  <text x="395" y="258" fill="#00cc66" font-size="9" font-weight="bold" text-anchor="middle">After</text>
  <text x="395" y="271" fill="#ccc" font-size="8" text-anchor="middle">Reordered to minimize T-gate overlap</text>
  <text x="395" y="283" fill="#ccc" font-size="8" text-anchor="middle">peak_rank ≤ 1  ✓</text>
  <text x="395" y="295" fill="#66ff99" font-size="8" text-anchor="middle">208 synthetic circuits: all ≤ rank 1</text>

  <!-- Critical note -->
  <rect x="520" y="244" width="245" height="55" rx="4" fill="#0a0a00" stroke="#ffaa00" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="642" y="258" fill="#ffaa00" font-size="9" font-weight="bold" text-anchor="middle">Critical Invariant</text>
  <text x="642" y="271" fill="#ccc" font-size="8" text-anchor="middle">208 synthetic circuits compiled</text>
  <text x="642" y="283" fill="#ccc" font-size="8" text-anchor="middle">All → rank ≤ 1 on MI300X</text>
  <text x="642" y="295" fill="#00e5ff" font-size="8" text-anchor="middle">No unbounded amplification</text>

  <!-- ==================== ARROW 3 ==================== -->
  <line x1="400" y1="310" x2="400" y2="328" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="420" y="323" fill="#aaa" font-size="9">Backend Lower</text>

  <!-- ==================== LAYER 4: Bytecode ==================== -->
  <rect x="20" y="330" width="760" height="110" rx="6" fill="#0d0d1a" stroke="#ff6633" stroke-width="1.5"/>
  <text x="30" y="348" fill="#ff6633" font-size="11" font-weight="bold">LAYER 4 — Flat Bytecode Array</text>

  <!-- Bytecode instructions -->
  <rect x="35" y="354" width="360" height="78" rx="3" fill="#0d0500" stroke="#ff6633" stroke-width="0.8"/>

  <text x="45" y="368" fill="#888" font-size="9">[0]</text>
  <text x="70" y="368" fill="#ff9966" font-size="9">OP_FRAME_H</text>
  <text x="165" y="368" fill="#ccc" font-size="9">(axis=0)</text>

  <text x="45" y="382" fill="#888" font-size="9">[1]</text>
  <text x="70" y="382" fill="#ff9966" font-size="9">OP_FRAME_CNOT</text>
  <text x="175" y="382" fill="#ccc" font-size="9">(axis=0, axis2=1)</text>

  <text x="45" y="396" fill="#888" font-size="9">[2]</text>
  <text x="70" y="396" fill="#ff6633" font-size="9" font-weight="bold">OP_EXPAND_T</text>
  <text x="165" y="396" fill="#ccc" font-size="9">(axis=0)</text>
  <text x="245" y="396" fill="#ffaa00" font-size="9">→ active_k: 0→1</text>

  <text x="45" y="410" fill="#888" font-size="9">[3]</text>
  <text x="70" y="410" fill="#ff6633" font-size="9" font-weight="bold">OP_MEAS_ACTIVE_INTERFERE</text>
  <text x="260" y="410" fill="#ccc" font-size="9">(axis=0)</text>
  <text x="305" y="410" fill="#ffaa00" font-size="9">→ 1→0</text>

  <text x="45" y="424" fill="#888" font-size="9">[4]</text>
  <text x="70" y="424" fill="#ff9966" font-size="9">OP_DETECTOR</text>
  <text x="165" y="424" fill="#ccc" font-size="9">(rec_offsets=[-1,-2])</text>

  <!-- Active-k tracker -->
  <rect x="415" y="354" width="355" height="78" rx="3" fill="#100500" stroke="#ffaa00" stroke-width="0.8"/>
  <text x="592" y="368" fill="#ffaa00" font-size="9" font-weight="bold" text-anchor="middle">active_k tracker  (Heisenberg rank)</text>
  <line x1="430" y1="373" x2="755" y2="373" stroke="#333" stroke-width="0.5"/>
  <text x="430" y="386" fill="#888" font-size="8">op</text>
  <text x="510" y="386" fill="#888" font-size="8">k_before</text>
  <text x="600" y="386" fill="#888" font-size="8">delta</text>
  <text x="670" y="386" fill="#888" font-size="8">k_after</text>

  <text x="430" y="399" fill="#ccc" font-size="8">OP_FRAME_H</text>
  <text x="520" y="399" fill="#aaa" font-size="8">0</text>  <text x="610" y="399" fill="#aaa" font-size="8">0</text>  <text x="680" y="399" fill="#aaa" font-size="8">0</text>
  <text x="430" y="412" fill="#ccc" font-size="8">OP_EXPAND_T</text>
  <text x="520" y="412" fill="#aaa" font-size="8">0</text>  <text x="610" y="412" fill="#ffaa00" font-size="8">+1</text> <text x="680" y="412" fill="#ffaa00" font-size="8">1</text>
  <text x="430" y="425" fill="#ccc" font-size="8">OP_MEAS_ACTIVE</text>
  <text x="520" y="425" fill="#aaa" font-size="8">1</text>  <text x="610" y="425" fill="#00cc66" font-size="8">−1</text> <text x="680" y="425" fill="#00cc66" font-size="8">0</text>

  <!-- ==================== ARROW 4 ==================== -->
  <line x1="400" y1="440" x2="400" y2="458" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="420" y="453" fill="#aaa" font-size="9">GPU Dispatch</text>

  <!-- ==================== LAYER 5: GPU Execution ==================== -->
  <rect x="20" y="460" width="760" height="128" rx="6" fill="#0d0d1a" stroke="#cc0033" stroke-width="1.5"/>
  <text x="30" y="478" fill="#cc0033" font-size="11" font-weight="bold">LAYER 5 — GPU Kernel Execution  (HIP / MI300X)</text>

  <!-- Thread blocks -->
  <!-- Block 0 -->
  <rect x="35" y="486" width="110" height="90" rx="4" fill="#1a0008" stroke="#cc0033" stroke-width="1"/>
  <text x="90" y="500" fill="#cc0033" font-size="9" font-weight="bold" text-anchor="middle">Thread Block 0</text>
  <text x="90" y="513" fill="#888" font-size="8" text-anchor="middle">wave 0–3</text>
  <text x="90" y="526" fill="#ff9966" font-size="8" text-anchor="middle">OP_FRAME_H</text>
  <text x="90" y="539" fill="#ff9966" font-size="8" text-anchor="middle">OP_FRAME_CNOT</text>
  <text x="90" y="552" fill="#ff6633" font-size="8" font-weight="bold" text-anchor="middle">OP_EXPAND_T ↑k</text>
  <text x="90" y="565" fill="#ffaa00" font-size="8" text-anchor="middle">shared rank mem</text>

  <!-- Block 1 -->
  <rect x="165" y="486" width="110" height="90" rx="4" fill="#1a0008" stroke="#cc0033" stroke-width="1"/>
  <text x="220" y="500" fill="#cc0033" font-size="9" font-weight="bold" text-anchor="middle">Thread Block 1</text>
  <text x="220" y="513" fill="#888" font-size="8" text-anchor="middle">wave 4–7</text>
  <text x="220" y="526" fill="#ff9966" font-size="8" text-anchor="middle">OP_FRAME_H</text>
  <text x="220" y="539" fill="#ff9966" font-size="8" text-anchor="middle">OP_FRAME_CNOT</text>
  <text x="220" y="552" fill="#ff6633" font-size="8" font-weight="bold" text-anchor="middle">OP_EXPAND_T ↑k</text>
  <text x="220" y="565" fill="#ffaa00" font-size="8" text-anchor="middle">shared rank mem</text>

  <!-- Block N -->
  <rect x="295" y="486" width="110" height="90" rx="4" fill="#1a0008" stroke="#cc0033" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="350" y="500" fill="#cc0033" font-size="9" font-weight="bold" text-anchor="middle">Thread Block N</text>
  <text x="350" y="513" fill="#888" font-size="8" text-anchor="middle">wave …</text>
  <text x="350" y="530" fill="#555" font-size="10" text-anchor="middle">. . .</text>
  <text x="350" y="550" fill="#555" font-size="10" text-anchor="middle">. . .</text>
  <text x="350" y="565" fill="#ffaa00" font-size="8" text-anchor="middle">shared rank mem</text>

  <!-- Bytecode ROM box -->
  <rect x="430" y="486" width="160" height="90" rx="4" fill="#110011" stroke="#9933cc" stroke-width="1"/>
  <text x="510" y="500" fill="#cc66ff" font-size="9" font-weight="bold" text-anchor="middle">Bytecode ROM</text>
  <text x="510" y="514" fill="#888" font-size="8" text-anchor="middle">(constant memory)</text>
  <text x="510" y="528" fill="#ccc" font-size="8" text-anchor="middle">[0] OP_FRAME_H</text>
  <text x="510" y="541" fill="#ccc" font-size="8" text-anchor="middle">[1] OP_FRAME_CNOT</text>
  <text x="510" y="554" fill="#ccc" font-size="8" text-anchor="middle">[2] OP_EXPAND_T</text>
  <text x="510" y="567" fill="#ccc" font-size="8" text-anchor="middle">[3] OP_MEAS_ACTIVE</text>

  <!-- Arrow from ROM to blocks -->
  <line x1="430" y1="531" x2="405" y2="531" stroke="#9933cc" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrp)"/>

  <!-- Result / Detector outcome -->
  <rect x="615" y="486" width="155" height="90" rx="4" fill="#001111" stroke="#00e5ff" stroke-width="1"/>
  <text x="692" y="500" fill="#00e5ff" font-size="9" font-weight="bold" text-anchor="middle">Detector Outcomes</text>
  <text x="692" y="514" fill="#888" font-size="8" text-anchor="middle">(device → host)</text>
  <text x="692" y="528" fill="#00cc66" font-size="8" text-anchor="middle">det[0] = meas[0]⊕meas[1]</text>
  <text x="692" y="542" fill="#ccc" font-size="8" text-anchor="middle">peak_rank enforced ≤ 1</text>
  <text x="692" y="556" fill="#00cc66" font-size="8" text-anchor="middle">active_k → 0 at exit ✓</text>
  <text x="692" y="570" fill="#888" font-size="8" text-anchor="middle">→ decoder feed</text>

  <!-- Arrow from blocks to result -->
  <line x1="405" y1="531" x2="615" y2="531" stroke="#cc0033" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arrr)"/>

  <!-- Dots between block 1 and N -->
  <text x="285" y="535" fill="#555" font-size="14" text-anchor="middle">…</text>

  <!-- ==================== Arrow markers ==================== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrg" markerWidth="6" markerHeight="6" refX="5" refY="2" orient="auto">
      <path d="M0,0 L0,4 L6,2 z" fill="#00cc66"/>
    </marker>
    <marker id="arro" markerWidth="6" markerHeight="6" refX="5" refY="2" orient="auto">
      <path d="M0,0 L0,4 L6,2 z" fill="#ffaa00"/>
    </marker>
    <marker id="arrp" markerWidth="6" markerHeight="6" refX="5" refY="2" orient="auto">
      <path d="M0,0 L0,4 L6,2 z" fill="#9933cc"/>
    </marker>
    <marker id="arrr" markerWidth="6" markerHeight="6" refX="5" refY="2" orient="auto">
      <path d="M0,0 L0,4 L6,2 z" fill="#cc0033"/>
    </marker>
  </defs>
</svg>
