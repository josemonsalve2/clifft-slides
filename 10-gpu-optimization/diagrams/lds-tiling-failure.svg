<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="monospace, Consolas, 'Courier New'">
  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e"/>

  <!-- Title / Hypothesis Box -->
  <rect x="20" y="12" width="760" height="62" rx="8" fill="#16213e" stroke="#4a4a8a" stroke-width="1.5"/>
  <text x="400" y="31" fill="#a0a0ff" font-size="11" text-anchor="middle" font-weight="bold">HYPOTHESIS (F8 LDS Tiling)</text>
  <text x="400" y="48" fill="#c8c8ff" font-size="12" text-anchor="middle">"Replace random HBM accesses with coalesced tile loads through LDS"</text>
  <text x="400" y="65" fill="#8888cc" font-size="11" text-anchor="middle">"Expected: Faster memory access for rank=10–19 array sweeps"</text>

  <!-- ─── MIDDLE LEFT: Before ─── -->
  <rect x="20" y="90" width="368" height="210" rx="8" fill="#0d2b0d" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="204" y="111" fill="#66bb6a" font-size="12" text-anchor="middle" font-weight="bold">Before  (Direct LDS at rank=10)</text>

  <!-- LDS array bar -->
  <rect x="50" y="122" width="308" height="26" rx="4" fill="#1b4a1b" stroke="#388e3c" stroke-width="1"/>
  <text x="204" y="140" fill="#a5d6a7" font-size="11" text-anchor="middle">Amplitude array  v[1024]  already in LDS</text>

  <!-- Arrow sweep -->
  <text x="204" y="167" fill="#c8e6c9" font-size="11" text-anchor="middle">Array sweep:</text>
  <rect x="60" y="174" width="96" height="22" rx="3" fill="#2e7d32" stroke="#66bb6a" stroke-width="1"/>
  <text x="108" y="190" fill="#e8f5e9" font-size="11" text-anchor="middle">v[idx0]</text>
  <line x1="156" y1="185" x2="236" y2="185" stroke="#66bb6a" stroke-width="2" marker-end="url(#arrowG)" marker-start="url(#arrowGr)"/>
  <text x="196" y="181" fill="#81c784" font-size="10" text-anchor="middle">↔</text>
  <rect x="240" y="174" width="96" height="22" rx="3" fill="#2e7d32" stroke="#66bb6a" stroke-width="1"/>
  <text x="288" y="190" fill="#e8f5e9" font-size="11" text-anchor="middle">v[idx1]</text>

  <!-- 0 barriers label -->
  <rect x="80" y="206" width="248" height="22" rx="4" fill="#1b3a1b" stroke="#388e3c" stroke-width="1"/>
  <text x="204" y="222" fill="#aed581" font-size="11" text-anchor="middle">0 barriers for array sweep access</text>

  <!-- Green check -->
  <circle cx="204" cy="260" r="22" fill="#1b4a1b" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="204" y="266" fill="#66bb6a" font-size="20" text-anchor="middle" font-weight="bold">✓</text>
  <text x="204" y="292" fill="#66bb6a" font-size="13" text-anchor="middle" font-weight="bold">Fast</text>

  <!-- ─── MIDDLE RIGHT: After ─── -->
  <rect x="412" y="90" width="368" height="210" rx="8" fill="#2b0d0d" stroke="#c62828" stroke-width="1.8"/>
  <text x="596" y="111" fill="#ef5350" font-size="12" text-anchor="middle" font-weight="bold">After  (LDS Tiling)</text>

  <!-- Same LDS array bar -->
  <rect x="442" y="122" width="308" height="26" rx="4" fill="#4a1b1b" stroke="#c62828" stroke-width="1"/>
  <text x="596" y="140" fill="#ef9a9a" font-size="11" text-anchor="middle">Same  v[1024]  in LDS  (unchanged)</text>

  <!-- Pipeline steps -->
  <rect x="452" y="157" width="110" height="22" rx="3" fill="#7b1f1f" stroke="#ef5350" stroke-width="1"/>
  <text x="507" y="173" fill="#ffcdd2" font-size="10" text-anchor="middle">Tile load barrier</text>
  <line x1="562" y1="168" x2="578" y2="168" stroke="#ef5350" stroke-width="1.5"/>

  <rect x="579" y="157" width="74" height="22" rx="3" fill="#7b1f1f" stroke="#ef5350" stroke-width="1"/>
  <text x="616" y="173" fill="#ffcdd2" font-size="10" text-anchor="middle">Compute</text>
  <line x1="653" y1="168" x2="669" y2="168" stroke="#ef5350" stroke-width="1.5"/>

  <rect x="670" y="157" width="110" height="22" rx="3" fill="#7b1f1f" stroke="#ef5350" stroke-width="1"/>
  <text x="725" y="173" fill="#ffcdd2" font-size="10" text-anchor="middle">Tile store barrier</text>

  <!-- Barriers label -->
  <rect x="452" y="188" width="308" height="22" rx="4" fill="#3e1010" stroke="#c62828" stroke-width="1"/>
  <text x="606" y="204" fill="#ff8a80" font-size="10.5" text-anchor="middle">3 × __syncthreads per sweep  WHERE 0 EXISTED BEFORE</text>

  <!-- Red X -->
  <circle cx="596" cy="248" r="22" fill="#4a1b1b" stroke="#c62828" stroke-width="1.5"/>
  <text x="596" y="255" fill="#ef5350" font-size="20" text-anchor="middle" font-weight="bold">✗</text>
  <text x="596" y="285" fill="#ef5350" font-size="12" text-anchor="middle" font-weight="bold">3 new barriers</text>

  <!-- ─── BOTTOM: Result ─── -->
  <rect x="20" y="314" width="760" height="122" rx="8" fill="#16213e" stroke="#4a4a8a" stroke-width="1.5"/>
  <text x="400" y="333" fill="#ff8a65" font-size="12" text-anchor="middle" font-weight="bold">Measured Regression</text>

  <!-- Performance numbers -->
  <rect x="35" y="342" width="350" height="22" rx="3" fill="#1a1030" stroke="#673ab7" stroke-width="1"/>
  <text x="210" y="358" fill="#ce93d8" font-size="11" text-anchor="middle">rank=10 (d5):  5.59 M → 1.90 M shots/s  (−66.1%)</text>

  <rect x="415" y="342" width="350" height="22" rx="3" fill="#1a1030" stroke="#673ab7" stroke-width="1"/>
  <text x="590" y="358" fill="#ce93d8" font-size="11" text-anchor="middle">rank=19 (d7):  143.9 K → 120.1 K shots/s  (−16.5%)</text>

  <!-- Root cause -->
  <rect x="35" y="372" width="730" height="26" rx="3" fill="#1c1c10" stroke="#f57f17" stroke-width="1"/>
  <text x="400" y="390" fill="#ffcc80" font-size="11" text-anchor="middle" font-weight="bold">Root cause: The coop kernel's amplitude array ALREADY lives in LDS. Adding tile boundaries creates barriers where none existed.</text>

  <!-- False premise -->
  <rect x="35" y="406" width="730" height="22" rx="3" fill="#0d1a0d" stroke="#388e3c" stroke-width="1"/>
  <text x="400" y="422" fill="#a5d6a7" font-size="11" text-anchor="middle">False premise: butterfly access pattern is STRIDED (predictable), not random. L2 hardware prefetcher handles it.</text>
</svg>
