  <text x="112" y="264" font-family="monospace" font-size="8.5" fill="#00e5ff">instruction (SIMT)</text>
  <text x="112" y="280" font-family="monospace" font-size="8.5" fill="#00ff88">__shfl_xor: intra-wave register</text>
  <text x="112" y="292" font-family="monospace" font-size="8.5" fill="#00ff88">swap — no barriers needed</text>
  <text x="112" y="310" font-family="monospace" font-size="8" fill="#8888bb">T0–T31  (wave half 0)</text>
  <text x="112" y="322" font-family="monospace" font-size="8" fill="#6688aa">T32–T63 (wave half 1)</text>

  <!-- ===== SECTION 4: clifft relevance panel ===== -->
  <rect x="10" y="346" width="780" height="58" rx="5" fill="#0a0f1a" stroke="#555577" stroke-width="1"/>
  <text x="20" y="362" font-family="monospace" font-size="9.5" font-weight="bold" fill="#e0e0ff">clifft relevance on MI300X</text>
  <text x="20" y="376" font-family="monospace" font-size="8.5" fill="#88ccff">&#8226; Keep gate kernels XCD-local &#8594; avoid 202 ns cross-XCD penalty; prefer same-XCD workgroup placement</text>
  <text x="20" y="388" font-family="monospace" font-size="8.5" fill="#88ccff">&#8226; Pack amplitudes in VGPRs (512/SIMD) &#8594; minimize LDS spills; butterfly ops stay register-resident</text>
  <text x="20" y="400" font-family="monospace" font-size="8.5" fill="#88ccff">&#8226; Use LDS (64 KB/CU) for sub-warp amplitude sharing; __shfl_xor for intra-wavefront reductions (no barrier)</text>

