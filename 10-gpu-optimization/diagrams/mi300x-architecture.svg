  <text x="388" y="154" font-family="monospace" font-size="8" fill="#ffcc88">64 KB / CU  ·  shared within workgroup</text>

  <line x1="478" y1="162" x2="478" y2="172" stroke="#ff9944" stroke-width="1.2" marker-end="url(#arrowO)"/>

  <!-- L2 Cache -->
  <rect x="382" y="172" width="192" height="36" rx="4" fill="#1a0a00" stroke="#ffaa44" stroke-width="1.5"/>
  <text x="388" y="186" font-family="monospace" font-size="8.5" font-weight="bold" fill="#ff9944">L2 Cache</text>
  <text x="388" y="200" font-family="monospace" font-size="8" fill="#ffcc88">Per-XCD  ·  ~8 MB  ·  8 instances</text>

  <line x1="478" y1="208" x2="478" y2="218" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowR)"/>

  <!-- HBM3 -->
