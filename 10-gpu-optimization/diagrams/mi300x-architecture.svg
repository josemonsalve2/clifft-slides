  <!-- ===== SECTION 2: Memory Hierarchy ===== -->
  <text x="382" y="72" font-family="monospace" font-size="11" font-weight="bold" fill="#ff9944">[ Memory Hierarchy ]</text>

  <!-- VGPRs -->
  <rect x="382" y="80" width="192" height="36" rx="4" fill="#1a0a00" stroke="#ff6600" stroke-width="1.5"/>
  <text x="388" y="94"  font-family="monospace" font-size="8.5" font-weight="bold" fill="#ff9944">VGPRs</text>
  <text x="388" y="108" font-family="monospace" font-size="8" fill="#ffcc88">512 / SIMD  ·  4 waves @ 128 VGPRs</text>

  <line x1="478" y1="116" x2="478" y2="126" stroke="#ff9944" stroke-width="1.2" marker-end="url(#arrowO)"/>

  <!-- LDS -->
