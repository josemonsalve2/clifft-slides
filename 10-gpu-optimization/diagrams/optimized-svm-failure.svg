<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" font-family="monospace, 'Courier New', sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">Approach F: 7 SVM Micro-Optimizations — 0% Improvement</text>

  <!-- rocprof bar -->
  <rect x="200" y="30" width="400" height="18" rx="4" fill="#2a1a1a" stroke="#ff4444" stroke-width="1"/>
  <text x="400" y="43" text-anchor="middle" fill="#ffaaaa" font-size="10">rocprof:  Baseline: 116.1ms  |  Optimized: 116.2ms  |  Delta: +0.04%</text>

  <!-- === 7 Cards, 2 rows: 4 top, 3 bottom, centered === -->

  <!-- Row 1: 4 cards -->
  <!-- Card 1 -->
  <rect x="10" y="55" width="183" height="68" rx="6" fill="#2a0a0a" stroke="#cc2222" stroke-width="1.5"/>
  <text x="101" y="72" text-anchor="middle" fill="#ff4444" font-size="11" font-weight="bold">Hot/Cold Split ❌</text>
  <line x1="10" y1="78" x2="193" y2="78" stroke="#cc2222" stroke-width="0.8"/>
  <text x="101" y="92" text-anchor="middle" fill="#cc8888" font-size="9.5">HIP compiler already</text>
  <text x="101" y="106" text-anchor="middle" fill="#cc8888" font-size="9.5">does this</text>

  <!-- Card 2 -->
  <rect x="203" y="55" width="183" height="68" rx="6" fill="#2a0a0a" stroke="#cc2222" stroke-width="1.5"/>
  <text x="294" y="72" text-anchor="middle" fill="#ff4444" font-size="11" font-weight="bold">Frame Batching ❌</text>
  <line x1="203" y1="78" x2="386" y2="78" stroke="#cc2222" stroke-width="0.8"/>
  <text x="294" y="92" text-anchor="middle" fill="#cc8888" font-size="9.5">Compiler already</text>
  <text x="294" y="106" text-anchor="middle" fill="#cc8888" font-size="9.5">schedules this</text>

  <!-- Card 3 -->
  <rect x="396" y="55" width="183" height="68" rx="6" fill="#2a0a0a" stroke="#cc2222" stroke-width="1.5"/>
  <text x="487" y="72" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">__launch_bounds__(256,6) ❌</text>
  <line x1="396" y1="78" x2="579" y2="78" stroke="#cc2222" stroke-width="0.8"/>
  <text x="487" y="92" text-anchor="middle" fill="#cc8888" font-size="9.5">Default already</text>
  <text x="487" y="106" text-anchor="middle" fill="#cc8888" font-size="9.5">optimal</text>

  <!-- Card 4 -->
  <rect x="589" y="55" width="201" height="68" rx="6" fill="#2a0a0a" stroke="#cc2222" stroke-width="1.5"/>
  <text x="689" y="72" text-anchor="middle" fill="#ff4444" font-size="11" font-weight="bold">Instruction Prefetch ❌</text>
  <line x1="589" y1="78" x2="790" y2="78" stroke="#cc2222" stroke-width="0.8"/>
  <text x="689" y="92" text-anchor="middle" fill="#cc8888" font-size="9.5">Hardware prefetcher</text>
  <text x="689" y="106" text-anchor="middle" fill="#cc8888" font-size="9.5">handles it</text>

  <!-- Row 2: 3 cards centered (x offsets: 107, 300, 493 for ~183px wide each with gaps) -->
  <!-- Card 5 -->
  <rect x="107" y="132" width="193" height="68" rx="6" fill="#2a0a0a" stroke="#cc2222" stroke-width="1.5"/>
  <text x="203" y="149" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">meas[] Reduction (1024→256) ❌</text>
  <line x1="107" y1="155" x2="300" y2="155" stroke="#cc2222" stroke-width="0.8"/>
  <text x="203" y="169" text-anchor="middle" fill="#cc8888" font-size="9.5">Page-granular</text>
  <text x="203" y="183" text-anchor="middle" fill="#cc8888" font-size="9.5">allocation</text>

  <!-- Card 6 -->
  <rect x="310" y="132" width="193" height="68" rx="6" fill="#2a0a0a" stroke="#cc2222" stroke-width="1.5"/>
  <text x="406" y="149" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">Compact px/pz (single word) ❌</text>
  <line x1="310" y1="155" x2="503" y2="155" stroke="#cc2222" stroke-width="0.8"/>
  <text x="406" y="169" text-anchor="middle" fill="#cc8888" font-size="9.5">No measurable</text>
  <text x="406" y="183" text-anchor="middle" fill="#cc8888" font-size="9.5">effect</text>

  <!-- Card 7 -->
  <rect x="513" y="132" width="193" height="68" rx="6" fill="#2a0a0a" stroke="#cc2222" stroke-width="1.5"/>
  <text x="609" y="149" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="bold">__noinline__ on cold handlers ❌</text>
  <line x1="513" y1="155" x2="706" y2="155" stroke="#cc2222" stroke-width="0.8"/>
  <text x="609" y="169" text-anchor="middle" fill="#cc8888" font-size="9.5">Already done</text>
  <text x="609" y="183" text-anchor="middle" fill="#cc8888" font-size="9.5">by -O3</text>

  <!-- Big Insight Box -->
  <rect x="30" y="212" width="740" height="82" rx="8" fill="#0a1f0a" stroke="#22cc44" stroke-width="2"/>
  <text x="400" y="234" text-anchor="middle" fill="#44ff88" font-size="12" font-weight="bold">Key Insight</text>
  <text x="400" y="254" text-anchor="middle" fill="#88ffaa" font-size="11">ROCm clang++ -O3 is excellent. All 7 optimizations replicate what the</text>
  <text x="400" y="270" text-anchor="middle" fill="#88ffaa" font-size="11">compiler already does automatically.</text>
  <text x="400" y="286" text-anchor="middle" fill="#55cc77" font-size="10">Tested individually and in combination — no statistically significant delta observed.</text>

  <!-- Lesson Box -->
  <rect x="30" y="306" width="740" height="54" rx="8" fill="#0d1a26" stroke="#4488cc" stroke-width="1.5"/>
  <text x="400" y="325" text-anchor="middle" fill="#66aaff" font-size="11" font-weight="bold">Lesson</text>
  <text x="400" y="343" text-anchor="middle" fill="#aaccee" font-size="10.5">Don't compete with the compiler on micro-optimizations.</text>
  <text x="400" y="358" text-anchor="middle" fill="#aaccee" font-size="10.5">Focus on algorithmic / structural changes instead.</text>

  <!-- Footer -->
  <text x="400" y="391" text-anchor="middle" fill="#444466" font-size="8.5">Approach F — SVM micro-optimization audit — AMD MI300X / HIP / ROCm clang++ -O3</text>
</svg>
