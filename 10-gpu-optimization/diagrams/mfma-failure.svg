<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e">
  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a2e"/>

  <!-- Section dividers -->
  <line x1="240" y1="10" x2="240" y2="360" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="560" y1="10" x2="560" y2="360" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ═══════════════════════════════════════════════
       LEFT: MFMA Ideal Use (green theme)
       ═══════════════════════════════════════════════ -->
  <text x="120" y="28" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="13" font-weight="bold">MFMA IDEAL USE</text>

  <!-- Large matrix tile graphic -->
  <!-- Matrix A (M x K) -->
  <rect x="18" y="40" width="60" height="96" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <text x="48" y="35" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9">A (M=16, K=4)</text>
  <!-- grid lines A -->
  <line x1="18" y1="64" x2="78" y2="64" stroke="#00cc66" stroke-width="0.5" opacity="0.5"/>
  <line x1="18" y1="88" x2="78" y2="88" stroke="#00cc66" stroke-width="0.5" opacity="0.5"/>
  <line x1="18" y1="112" x2="78" y2="112" stroke="#00cc66" stroke-width="0.5" opacity="0.5"/>
  <line x1="33" y1="40" x2="33" y2="136" stroke="#00cc66" stroke-width="0.5" opacity="0.5"/>
  <line x1="48" y1="40" x2="48" y2="136" stroke="#00cc66" stroke-width="0.5" opacity="0.5"/>
  <line x1="63" y1="40" x2="63" y2="136" stroke="#00cc66" stroke-width="0.5" opacity="0.5"/>
  <text x="48" y="92" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9" opacity="0.8">16×4</text>

  <!-- × symbol -->
  <text x="90" y="95" fill="#aaa" font-family="monospace" font-size="16">×</text>

  <!-- Matrix B (K x N) -->
  <rect x="102" y="64" width="96" height="24" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <text x="150" y="59" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9">B (K=4, N=16)</text>
  <line x1="126" y1="64" x2="126" y2="88" stroke="#00cc66" stroke-width="0.5" opacity="0.5"/>
  <line x1="150" y1="64" x2="150" y2="88" stroke="#00cc66" stroke-width="0.5" opacity="0.5"/>
  <line x1="174" y1="64" x2="174" y2="88" stroke="#00cc66" stroke-width="0.5" opacity="0.5"/>
  <text x="150" y="80" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9" opacity="0.8">4×16</text>

  <!-- → symbol -->
  <text x="202" y="95" fill="#aaa" font-family="monospace" font-size="14">→</text>

  <!-- Matrix C result (M x N) -->
  <rect x="218" y="40" width="16" height="96" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <!-- small preview -->
  <text x="226" y="95" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="7">C</text>

  <text x="120" y="155" text-anchor="middle" fill="#00cc66" font-family="monospace" font-size="9">Matrix cores: thousands of</text>
  <text x="120" y="167" text-anchor="middle" fill="#00cc66" font-family="monospace" font-size="9">FMAs per instruction</text>

  <!-- MFMA specs -->
  <rect x="12" y="178" width="216" height="55" rx="4" fill="#002211" stroke="#00ff88" stroke-width="1"/>
  <text x="120" y="193" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9" font-weight="bold">v_mfma_f32_16x16x4f32</text>
  <text x="120" y="207" text-anchor="middle" fill="#aaffcc" font-family="monospace" font-size="8">Minimum tile: M=16, N=16, K=4</text>
  <text x="120" y="219" text-anchor="middle" fill="#aaffcc" font-family="monospace" font-size="8">512 FMAs per instruction</text>
  <text x="120" y="231" text-anchor="middle" fill="#aaffcc" font-family="monospace" font-size="8">Designed for large dense GEMMs</text>

  <!-- Good: throughput bar -->
  <text x="14" y="248" fill="#00ff88" font-family="monospace" font-size="8">Throughput:</text>
  <rect x="14" y="252" width="180" height="8" rx="2" fill="#003322"/>
  <rect x="14" y="252" width="180" height="8" rx="2" fill="#00ff88" opacity="0.8"/>
  <text x="200" y="260" fill="#00ff88" font-family="monospace" font-size="8">HIGH</text>


  <!-- ═══════════════════════════════════════════════
       CENTER: Failure Modes (red theme)
       ═══════════════════════════════════════════════ -->
  <text x="400" y="28" text-anchor="middle" fill="#ff4444" font-family="monospace" font-size="13" font-weight="bold">WHY MFMA FAILS FOR QUANTUM</text>

  <!-- Failure mode boxes -->
  <!-- 1 -->
  <rect x="248" y="38" width="304" height="44" rx="4" fill="#2a0a0a" stroke="#ff4444" stroke-width="1.5"/>
  <text x="260" y="55" fill="#ff6666" font-family="monospace" font-size="9" font-weight="bold">1. Tiny K Dimension</text>
  <text x="260" y="68" fill="#ffaaaa" font-family="monospace" font-size="8">Quantum gate K=2 (2x2 matrix) vs MFMA min K=4</text>
  <text x="260" y="79" fill="#ffaaaa" font-family="monospace" font-size="8">→ 50% of matrix cores sit idle, wasting silicon</text>

  <!-- 2 -->
  <rect x="248" y="90" width="304" height="44" rx="4" fill="#2a0a0a" stroke="#ff4444" stroke-width="1.5"/>
  <text x="260" y="107" fill="#ff6666" font-family="monospace" font-size="9" font-weight="bold">2. Gather/Scatter Overhead</text>
  <text x="260" y="120" fill="#ffaaaa" font-family="monospace" font-size="8">Butterfly stride: pairs at v[i] and v[i | 2^axis]</text>
  <text x="260" y="131" fill="#ffaaaa" font-family="monospace" font-size="8">~80 cycles for data rearrangement per gate</text>

  <!-- 3 -->
  <rect x="248" y="142" width="304" height="44" rx="4" fill="#2a0a0a" stroke="#ff4444" stroke-width="1.5"/>
  <text x="260" y="159" fill="#ff6666" font-family="monospace" font-size="9" font-weight="bold">3. Complex Decomposition</text>
  <text x="260" y="172" fill="#ffaaaa" font-family="monospace" font-size="8">MFMA only handles real numbers natively</text>
  <text x="260" y="183" fill="#ffaaaa" font-family="monospace" font-size="8">4 real MFMAs needed per complex MMA op</text>

  <!-- 4: slowdown banner -->
  <rect x="248" y="194" width="304" height="38" rx="4" fill="#3a0000" stroke="#ff0000" stroke-width="2"/>
  <text x="400" y="210" text-anchor="middle" fill="#ff2222" font-family="monospace" font-size="11" font-weight="bold">45-70x SLOWER</text>
  <text x="400" y="225" text-anchor="middle" fill="#ffaaaa" font-family="monospace" font-size="9">vs scalar VALU butterfly approach</text>

  <!-- Combined slowdown bar vs good bar -->
  <text x="250" y="248" fill="#ff4444" font-family="monospace" font-size="8">MFMA quantum perf:</text>
  <rect x="250" y="252" width="180" height="8" rx="2" fill="#330000"/>
  <rect x="250" y="252" width="6" height="8" rx="2" fill="#ff4444" opacity="0.8"/>
  <text x="436" y="260" fill="#ff4444" font-family="monospace" font-size="8">LOW (1/60th)</text>


  <!-- ═══════════════════════════════════════════════
       RIGHT: Quantum Gates (blue/purple theme)
       ═══════════════════════════════════════════════ -->
  <text x="680" y="28" text-anchor="middle" fill="#aa88ff" font-family="monospace" font-size="13" font-weight="bold">QUANTUM GATE SHAPE</text>

  <!-- 1-qubit gate: 2x2 matrix -->
  <text x="680" y="46" text-anchor="middle" fill="#cc99ff" font-family="monospace" font-size="10" font-weight="bold">1-Qubit Gate: 2x2 Complex</text>
  <!-- bracket left -->
  <text x="568" y="90" fill="#cc99ff" font-family="monospace" font-size="28">[</text>
  <!-- matrix cells -->
  <rect x="583" y="60" width="40" height="30" rx="2" fill="#1a0a33" stroke="#9966ff" stroke-width="1"/>
  <text x="603" y="80" text-anchor="middle" fill="#ddbbff" font-family="monospace" font-size="11">a</text>
  <rect x="627" y="60" width="40" height="30" rx="2" fill="#1a0a33" stroke="#9966ff" stroke-width="1"/>
  <text x="647" y="80" text-anchor="middle" fill="#ddbbff" font-family="monospace" font-size="11">b</text>
  <rect x="583" y="94" width="40" height="30" rx="2" fill="#1a0a33" stroke="#9966ff" stroke-width="1"/>
  <text x="603" y="114" text-anchor="middle" fill="#ddbbff" font-family="monospace" font-size="11">c</text>
  <rect x="627" y="94" width="40" height="30" rx="2" fill="#1a0a33" stroke="#9966ff" stroke-width="1"/>
  <text x="647" y="114" text-anchor="middle" fill="#ddbbff" font-family="monospace" font-size="11">d</text>
  <!-- bracket right -->
  <text x="670" y="90" fill="#cc99ff" font-family="monospace" font-size="28">]</text>

  <!-- size label -->
  <text x="620" y="140" text-anchor="middle" fill="#9966ff" font-family="monospace" font-size="8">2×2 complex = K=2 real pairs</text>

  <!-- 2-qubit gate: 4x4 matrix -->
  <text x="680" y="158" text-anchor="middle" fill="#cc99ff" font-family="monospace" font-size="10" font-weight="bold">2-Qubit Gate: 4x4 Complex</text>
  <!-- draw 4x4 grid small -->
  <rect x="568" y="166" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="587" y="166" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="606" y="166" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="625" y="166" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="568" y="185" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="587" y="185" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="606" y="185" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="625" y="185" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="568" y="204" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="587" y="204" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="606" y="204" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="625" y="204" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="568" y="223" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="587" y="223" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="606" y="223" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <rect x="625" y="223" width="16" height="16" rx="1" fill="#1a0a33" stroke="#9966ff" stroke-width="0.8"/>
  <text x="648" y="200" fill="#9966ff" font-family="monospace" font-size="8">4×4</text>

  <!-- Butterfly pattern label -->
  <rect x="570" y="246" width="218" height="28" rx="3" fill="#110022" stroke="#9966ff" stroke-width="1"/>
  <text x="679" y="258" text-anchor="middle" fill="#cc99ff" font-family="monospace" font-size="8" font-weight="bold">Butterfly: v[i] ↔ v[i | 2^axis]</text>
  <text x="679" y="270" text-anchor="middle" fill="#aa88ff" font-family="monospace" font-size="8">Non-contiguous strided access pattern</text>

  <!-- ═══════════════════════════════════════════════
       BOTTOM: Lesson Banner
       ═══════════════════════════════════════════════ -->
  <rect x="10" y="290" width="780" height="58" rx="6" fill="#0d0d1f" stroke="#ff6633" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" fill="#ff8844" font-family="monospace" font-size="11" font-weight="bold">LESSON: Tensor/Matrix Cores are NOT applicable to quantum gate operations.</text>
  <text x="400" y="328" text-anchor="middle" fill="#ffccaa" font-family="monospace" font-size="10">The workload is element-wise butterfly, not GEMM-shaped. MFMA tiles require contiguous</text>
  <text x="400" y="344" text-anchor="middle" fill="#ffccaa" font-family="monospace" font-size="10">dense blocks; quantum gates operate on scattered pairs with K too small to fill matrix cores.</text>

  <!-- Divider arrows showing mismatch -->
  <!-- Arrow from MFMA tile size to quantum gate size comparison -->
  <text x="400" y="282" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">▼ mismatch ▼</text>
</svg>
