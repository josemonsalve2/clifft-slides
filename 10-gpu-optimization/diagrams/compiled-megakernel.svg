<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Compiled Megakernel Approach A</title>
  <desc id="desc">A quantum GPU compilation pipeline from a Stim circuit through bytecode and host-side code generation to generated HIP source, optimized compilation, a cached hsaco binary, and kernel launch, with results and an SVM comparison.</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#00bcd4"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #e0e0e0; }
      .code { font-family: "DejaVu Sans Mono", Consolas, monospace; fill: #b0bec5; }
      .section { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; fill: #80deea; letter-spacing: 0.8px; }
      .box-title { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; fill: #e0e0e0; }
      .pipe-box { fill: #202443; stroke: #00bcd4; stroke-width: 1.8; }
      .arrow-line { stroke: #00bcd4; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrow-label { font-family: Arial, Helvetica, sans-serif; font-size: 9px; font-weight: 700; fill: #ffd54f; }
    </style>
  </defs>

  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Top: source circuit -->
  <text x="18" y="18" class="section">SOURCE CIRCUIT</text>
  <g filter="url(#shadow)">
    <rect x="18" y="27" width="764" height="88" rx="12" fill="#16213e" stroke="#00bcd4" stroke-width="2"/>
    <rect x="34" y="43" width="116" height="55" rx="8" fill="#202443" stroke="#00bcd4" stroke-width="1"/>
    <text x="92" y="64" class="box-title" text-anchor="middle">Stim Circuit</text>
    <text x="92" y="85" class="code" font-size="13" text-anchor="middle">H 0; CNOT 0 1; M 0</text>
    <path d="M171 70 H733" stroke="#00bcd4" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="452" y="60" class="label" font-size="13" text-anchor="middle">Compile the exact instruction stream into one specialized GPU kernel</text>
    <text x="452" y="83" class="label" font-size="11" fill="#ffd54f" text-anchor="middle">Approach A · Compiled Megakernel</text>
  </g>

  <!-- Middle: compilation pipeline -->
  <text x="18" y="140" class="section">COMPILATION PIPELINE</text>

  <!-- Box 1 -->
  <g filter="url(#shadow)">
    <rect x="8" y="160" width="74" height="285" rx="9" class="pipe-box"/>
    <rect x="8" y="160" width="74" height="34" rx="9" fill="#12364a"/>
    <path d="M8 194 H82" stroke="#00bcd4" stroke-width="1"/>
    <text x="45" y="181" class="box-title" text-anchor="middle">Bytecode</text>
    <text x="16" y="224" class="code" font-size="9.2">
      <tspan x="16" dy="0">OP_H 0</tspan>
      <tspan x="16" dy="25">OP_CNOT</tspan>
      <tspan x="16" dy="14">0 1</tspan>
      <tspan x="16" dy="25">OP_MEASURE</tspan>
      <tspan x="16" dy="14">0</tspan>
    </text>
  </g>

  <!-- parse -->
  <path d="M84 302 H108" class="arrow-line"/>
  <text x="96" y="291" class="arrow-label" text-anchor="middle">parse</text>

  <!-- Box 2 -->
  <g filter="url(#shadow)">
    <rect x="112" y="160" width="94" height="285" rx="9" class="pipe-box"/>
    <rect x="112" y="160" width="94" height="48" rx="9" fill="#12364a"/>
    <path d="M112 208 H206" stroke="#00bcd4" stroke-width="1"/>
    <text x="159" y="180" class="box-title" text-anchor="middle">
      <tspan x="159">Host-side</tspan>
      <tspan x="159" dy="15">Code Generator</tspan>
    </text>
    <text x="159" y="241" class="code" font-size="9.5" text-anchor="middle">
      <tspan x="159">kernel_</tspan>
      <tspan x="159" dy="14">codegen.cc</tspan>
    </text>
    <path d="M130 282 H188 M130 297 H177 M130 312 H184 M130 327 H169" stroke="#546e7a" stroke-width="2" stroke-linecap="round"/>
    <text x="159" y="378" class="label" font-size="9.5" text-anchor="middle">specializes</text>
    <text x="159" y="392" class="label" font-size="9.5" text-anchor="middle">the circuit</text>
  </g>

  <!-- emit -->
  <path d="M208 302 H232" class="arrow-line"/>
  <text x="220" y="291" class="arrow-label" text-anchor="middle">emit</text>

  <!-- Box 3 -->
  <g filter="url(#shadow)">
    <rect x="236" y="160" width="178" height="285" rx="9" class="pipe-box"/>
    <rect x="236" y="160" width="178" height="34" rx="9" fill="#12364a"/>
    <path d="M236 194 H414" stroke="#00bcd4" stroke-width="1"/>
    <text x="325" y="181" class="box-title" text-anchor="middle">Generated HIP Source</text>
    <text x="246" y="222" class="code" font-size="8.2">
      <tspan x="246" fill="#80deea">// Instruction 0:</tspan>
      <tspan x="246" dy="13" fill="#80deea">FRAME_CNOT(3,7)</tspan>
      <tspan x="246" dy="22">px[0] ^=</tspan>
      <tspan x="246" dy="13">(uint64_t(px_c) &lt;&lt; 7);</tspan>
      <tspan x="246" dy="30" fill="#80deea">// Instruction 1:</tspan>
      <tspan x="246" dy="13" fill="#80deea">EXPAND_T(axis=0)</tspan>
      <tspan x="246" dy="22">v[half] = v[0] *</tspan>
      <tspan x="246" dy="13">0.707...;</tspan>
    </text>
    <rect x="251" y="382" width="148" height="38" rx="6" fill="#1b3042" stroke="#ffd54f" stroke-width="1"/>
    <text x="325" y="397" class="label" font-size="9" fill="#ffd54f" text-anchor="middle">straight-line source</text>
    <text x="325" y="411" class="label" font-size="9" text-anchor="middle">only used handlers emitted</text>
  </g>

  <path d="M416 302 H438" class="arrow-line"/>

  <!-- Box 4 -->
  <g filter="url(#shadow)">
    <rect x="442" y="160" width="96" height="285" rx="9" fill="#202443" stroke="#4caf50" stroke-width="2"/>
    <rect x="442" y="160" width="96" height="34" rx="9" fill="#173b34"/>
    <path d="M442 194 H538" stroke="#4caf50" stroke-width="1"/>
    <text x="490" y="181" class="box-title" text-anchor="middle">clang++ -O3</text>
    <text x="490" y="232" class="code" font-size="9.2" text-anchor="middle">
      <tspan x="490">clang++ -O3</tspan>
      <tspan x="490" dy="20">--offload-arch</tspan>
      <tspan x="490" dy="14">=gfx942</tspan>
    </text>
    <rect x="454" y="326" width="72" height="48" rx="6" fill="#321e2d" stroke="#f44336" stroke-width="1.7"/>
    <text x="490" y="348" class="box-title" text-anchor="middle" fill="#f44336">HIPRTC</text>
    <text x="490" y="365" class="label" font-size="9.5" text-anchor="middle" fill="#f44336">-14% perf</text>
    <path d="M458 332 L522 368 M522 332 L458 368" stroke="#f44336" stroke-width="2.4" stroke-linecap="round"/>
    <text x="490" y="407" class="label" font-size="9" text-anchor="middle" fill="#4caf50">offline optimized</text>
  </g>

  <!-- compile -->
  <path d="M540 302 H562" class="arrow-line"/>
  <text x="551" y="291" class="arrow-label" text-anchor="middle">compile</text>

  <!-- Box 5 -->
  <g filter="url(#shadow)">
    <rect x="566" y="160" width="82" height="285" rx="9" class="pipe-box"/>
    <rect x="566" y="160" width="82" height="34" rx="9" fill="#12364a"/>
    <path d="M566 194 H648" stroke="#00bcd4" stroke-width="1"/>
    <text x="607" y="181" class="box-title" text-anchor="middle">.hsaco binary</text>
    <path d="M589 234 H625 V287 H589 Z M615 234 V245 H625" fill="none" stroke="#80deea" stroke-width="2"/>
    <path d="M596 257 H618 M596 266 H618 M596 275 H611" stroke="#546e7a" stroke-width="1.5"/>
    <rect x="579" y="326" width="56" height="28" rx="14" fill="#173b34" stroke="#4caf50"/>
    <text x="607" y="344" class="label" font-size="9.5" text-anchor="middle" fill="#4caf50">disk cached</text>
    <text x="607" y="388" class="label" font-size="8.8" text-anchor="middle">reused on</text>
    <text x="607" y="401" class="label" font-size="8.8" text-anchor="middle">next run</text>
  </g>

  <!-- load -->
  <path d="M650 302 H672" class="arrow-line"/>
  <text x="661" y="291" class="arrow-label" text-anchor="middle">load</text>

  <!-- Box 6 -->
  <g filter="url(#shadow)">
    <rect x="676" y="160" width="116" height="285" rx="9" class="pipe-box"/>
    <rect x="676" y="160" width="116" height="48" rx="9" fill="#12364a"/>
    <path d="M676 208 H792" stroke="#00bcd4" stroke-width="1"/>
    <text x="734" y="180" class="box-title" text-anchor="middle">
      <tspan x="734">hipModuleLaunch</tspan>
      <tspan x="734" dy="15">Kernel()</tspan>
    </text>
    <circle cx="734" cy="272" r="31" fill="#173b34" stroke="#4caf50" stroke-width="2"/>
    <path d="M721 284 L734 251 L747 284 L734 277 Z" fill="#4caf50"/>
    <circle cx="734" cy="272" r="5" fill="#ffd54f"/>
    <text x="734" y="335" class="label" font-size="10" text-anchor="middle">one specialized</text>
    <text x="734" y="350" class="label" font-size="10" text-anchor="middle">megakernel</text>
    <text x="734" y="398" class="label" font-size="9" fill="#ffd54f" text-anchor="middle">GPU execution</text>
  </g>

  <!-- Bottom: result and comparison -->
  <text x="18" y="478" class="section">RESULTS &amp; COMPARISON</text>

  <g filter="url(#shadow)">
    <rect x="18" y="490" width="374" height="90" rx="10" fill="#17342f" stroke="#4caf50" stroke-width="2"/>
    <circle cx="43" cy="515" r="12" fill="#4caf50"/>
    <path d="M37 515 L41 519 L49 510" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="63" y="519" class="label" font-size="13" font-weight="700" fill="#4caf50">Result: Only 8 of 35 handlers compiled</text>
    <text x="34" y="552" class="code" font-size="12.2" fill="#e0e0e0">VGPRs: <tspan fill="#f44336">84</tspan> → <tspan fill="#4caf50">60–72</tspan>, throughput: <tspan fill="#4caf50">+5–18%</tspan></text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="490" width="180" height="90" rx="8" fill="#27203a" stroke="#f44336" stroke-width="1.8"/>
    <text x="500" y="507" class="box-title" text-anchor="middle" fill="#f44336">SVM Approach</text>
    <text x="421" y="525" class="code" font-size="8.5">
      <tspan x="421">switch(opcode) {</tspan>
      <tspan x="421" dy="12">  case OP_H: ...</tspan>
      <tspan x="421" dy="12">  case OP_CNOT: ...</tspan>
      <tspan x="421" dy="12">  // 35 handlers</tspan>
      <tspan x="421" dy="12">}</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="602" y="490" width="180" height="90" rx="8" fill="#17342f" stroke="#4caf50" stroke-width="1.8"/>
    <text x="692" y="507" class="box-title" text-anchor="middle" fill="#4caf50">Compiled Approach</text>
    <text x="613" y="525" class="code" font-size="8.5">
      <tspan x="613">// straight-line calls</tspan>
      <tspan x="613" dy="12">// constants baked in</tspan>
      <tspan x="613" dy="15">FRAME_CNOT(3,7);</tspan>
      <tspan x="613" dy="15">EXPAND_T(axis=0);</tspan>
    </text>
  </g>
</svg>